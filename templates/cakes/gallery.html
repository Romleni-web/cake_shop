{% extends "base.html" %}

{% block title %}Cake Gallery{% endblock %}

{% block content %}
<div class="text-center mb-5">
    <h1 class="display-4">Our Cake Gallery</h1>
    <p class="lead">Glimpses of our delicious creations</p>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for img in images %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                <img src="{{ img.image.url }}" class="card-img-top" alt="{{ img.title }}" style="object-fit: cover; height: 300px;">
                <div class="card-body">
                    <h5 class="card-title">{{ img.title }}</h5>
                </div>
            </div>
        </div>
    {% empty %}
        {# Fallback for Empty Gallery #}
        <div class="col"><img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500" alt="Chocolate Cake" class="card-img-top rounded shadow-sm"></div>
        <div class="col"><img src="https://images.unsplash.com/photo-1558961363-fa8fdf82db35?w=500" alt="Vanilla Cake" class="card-img-top rounded shadow-sm"></div>
        <div class="col"><img src="https://images.unsplash.com/photo-1535141192574-5d4897c12636?w=500" alt="Birthday Cake" class="card-img-top rounded shadow-sm"></div>
    {% endfor %}
</div>
{% endblock %}
