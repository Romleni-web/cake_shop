{% extends "base.html" %}

{% block title %}Cake Gallery{% endblock %}

{% block content %}
<div class="text-center mb-5">
    <h1 class="display-4">Our Cake Gallery</h1>
    <p class="lead">Glimpses of our delicious creations</p>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for img in images %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                <img src="{{ img.image.url }}" class="card-img-top" alt="{{ img.title }}" style="object-fit: cover; height: 300px;">
                <div class="card-body">
                    <h5 class="card-title">{{ img.title }}</h5>
                </div>
            </div>
        </div>
    {% empty %}
        <div class="col-12 text-center">
            <p>No images in the gallery yet.</p>
        </div>
    {% endfor %}
</div>
{% endblock %}
